#
#
# STYLING
#
#
# Fonts
default_font: &default_font JetBrains Mono NF:pixelsize=10
info_font: &info_font JetBrains Mono NF:pixelsize=10:slant=italic
icon_font: &icon_font JetBrains Mono NF:style=solid:pixelsize=12
# Margin
deco_margin: &deco_margin 8
# Basic colours
fg_color: &fg_color e8e8e8ff
bg_color: &bg_color 000000ff
info_color: &info_color acb4bdff
white: &white ffffffff
# Component accents
dsp_color: &dsp_color ffa95eff
lum_color: &lum_color dbd76bff
mem_color: &mem_color a3f095ff
cpu_color: &cpu_color 63c99aff
spk_color: &spk_color 63c99aff
mic_color: &mic_color 9ee4ffff
net_color: &net_color be9cffff
bat_color: &bat_color ff80aaff
# State Styling
good:
  &good {
    margin: *deco_margin,
    foreground: 000000ff,
    deco: { background: { color: 0fd17aff } },
  }
warn:
  &warn {
    margin: *deco_margin,
    foreground: *bg_color,
    deco: { background: { color: ffd554ff } },
  }
error:
  &error {
    margin: *deco_margin,
    foreground: ffffffff,
    deco: { background: { color: ff4545ff } },
  }
# Sway Indicator
white_deco: &white_deco { background: { color: *white } }
fade_white_deco: &fade_white_deco { background: { color: ffffff55 } }
error_deco: &error_deco { background: { color: de284fff } }
# Detail Properties
info: &info { font: *info_font, foreground: *info_color }
#
#
# BAR
#
#
bar:
  monitor: eDP-1
  height: 18
  location: top
  spacing: 12
  margin: 7
  font: *default_font
  foreground: *fg_color
  background: *bg_color
  #
  #
  # LEFT
  #
  #
  left:
    - i3:
        sort: ascending
        anchors:
          - string:
              &i3_common {
                margin: 7,
                on-click:
                  {
                    left: "swaymsg --quiet workspace {name}",
                    wheel-up: "swaymsg --quiet workspace next",
                    wheel-down: "swaymsg --quiet workspace prev",
                  },
              }
          - string: &default { <<: *i3_common, text: "{name}" }
          - string: &music { <<: *i3_common, text: 󰼛, font: *icon_font }
          - focused: &focused
              foreground: 000000ff
              deco: { stack: [*white_deco] }
          - unfocused: &unfocused
              foreground: *fg_color
              deco: *fade_white_deco
          - urgent: &urgent
              foreground: *fg_color
              deco: { stack: [*error_deco] }
          - map: &i3_mode
              default:
                - string:
                    margin: 5
                    text: "{mode}"
                    deco: { background: { color: cc421dff } }
                - empty: { right-margin: 7 }
              conditions:
                mode == default: { empty: {} }
        strip-workspace-numbers: false
        content:
          "":
            map:
              conditions:
                state == focused: { string: { <<: [*default, *focused] } }
                state == unfocused: { string: { <<: [*default, *unfocused] } }
                state == invisible: { string: { <<: *default } }
                state == urgent: { string: { <<: [*default, *urgent] } }
          music:
            map:
              conditions:
                state == focused: { string: { <<: [*music, *focused] } }
                state == unfocused: { string: { <<: [*music, *unfocused] } }
                state == invisible: { string: { <<: *music } }
                state == urgent: { string: { <<: [*music, *urgent] } }
    - label:
        content:
          - string: { text: "DSP", foreground: *dsp_color }
          - string:
              {
                text: " 󰙟",
                font: *icon_font,
                on-click: /bin/sh -c "sway output eDP-1 toggle; /home/$USER/.config/yambar/scripts/launch-yambar.sh &",
              }
          - string: { text: " [", <<: *info }
          - string:
              {
                text: "▭  ▯",
                on-click: /bin/sh -c "sway-displays set",
                font: *icon_font,
                <<: *info,
              }
          - string: { text: "]", <<: *info }
    - backlight:
        name: intel_backlight
        content:
          - string:
              {
                text: "LUM",
                foreground: *lum_color,
                on-click:
                  {
                    wheel-down: brightnessctl set 5%- &,
                    wheel-up: brightnessctl set +5% &,
                    left: /bin/sh -c "python3 /home/reuben/.config/yambar/scripts/brightness.py -",
                    right: /bin/sh -c "python3 /home/reuben/.config/yambar/scripts/brightness.py +",
                  },
              }
          - string:
              {
                text: " {percent}% ",
                on-click:
                  {
                    wheel-down: brightnessctl set 5%- &,
                    wheel-up: brightnessctl set +5% &,
                    left: /bin/sh -c "python3 /home/reuben/.config/yambar/scripts/brightness.py -",
                    right: /bin/sh -c "python3 /home/reuben/.config/yambar/scripts/brightness.py +",
                  },
              }
          - string:
              {
                text: " [+ /",
                on-click: /bin/sh -c "python3 /home/reuben/.config/yambar/scripts/brightness.py +",
                <<: *info,
              }
          - string:
              {
                text: " -]",
                on-click: /bin/sh -c "python3 /home/reuben/.config/yambar/scripts/brightness.py -",
                <<: *info,
              }
    - mem:
        poll-interval: 15000
        content:
          - string: { text: "MEM", foreground: *mem_color }
          - string: { text: " {percent_used}%" }
          - string: { text: " [{used:mb} MB]", <<: *info }
    - cpu:
        poll-interval: 15000
        content:
          map:
            conditions:
              id == -1:
                - string: { text: "CPU", foreground: *cpu_color }
                - string: { text: " {cpu}%" }
  #
  # CENTER
  #
  #
  center:
    - clock:
        time-format: "%I:%M %p"
        date-format: "%^A, %d %^B %Y"
        content:
          - string:
              { text: "󰅐   {time}  |  {date}", foreground: *white, margin: 25 }
  #
  #
  # RIGHT
  #
  #
  right:
    - pulse:
        anchors:
          - sink_controls:
              &sink_controls {
                on-click:
                  {
                    left: /bin/sh -c "amixer set Master toggle",
                    wheel-up: /bin/sh -c "pactl set-sink-volume @DEFAULT_SINK@ +5%",
                    wheel-down: /bin/sh -c "pactl set-sink-volume	@DEFAULT_SINK@ -5%",
                  },
              }
          - sink_percent:
              &sink_percent {
                string: { text: " {sink_percent}%", <<: *sink_controls },
              }
          - sink_info:
              &sink_info {
                string:
                  {
                    text: " [{sink_port}",
                    max: 10,
                    on-click: /bin/sh -c "/home/$USER/.config/yambar/scripts/pulse-sink-toggle.sh",
                    <<: *info,
                  },
              }
          - sink_info_end: &sink_info_end { string: { text: "]", <<: *info } }
        content:
          map:
            conditions:
              ~online: { string: { text: "SPK ERR" } }
              online:
                map:
                  conditions:
                    sink_muted:
                      - string: { text: "VOL", <<: [*warn, *sink_controls] }
                      - string: { text: " MUT", <<: *sink_controls }
                      - <<: *sink_info
                      - <<: *sink_info_end
                    ~sink_muted:
                      - string:
                          {
                            text: "VOL",
                            foreground: *spk_color,
                            <<: *sink_controls,
                          }
                      - <<: *sink_percent
                      - <<: *sink_info
                      - <<: *sink_info_end
    - pulse:
        anchors:
          - source_info:
              &source_info {
                string:
                  {
                    text: " [{source_port}",
                    max: 11,
                    on-click: /bin/sh -c "/home/$USER/.config/yambar/scripts/pulse-source-toggle.sh",
                    <<: *info,
                  },
              }
          - source_info_end:
              &source_info_end { string: { text: "]", <<: *info } }
        content:
          map:
            conditions:
              ~online: { string: { text: "MIC ERR" } }
              online:
                map:
                  conditions:
                    source_muted:
                      - string:
                          {
                            text: "MIC",
                            on-click: /bin/sh -c "amixer set Capture toggle",
                            <<: *error,
                          }
                      - string: { text: " MUT" }
                      - <<: *source_info
                      - <<: *source_info_end
                    ~source_muted:
                      - string:
                          {
                            text: "MIC",
                            on-click: /bin/sh -c "amixer set Capture toggle",
                            foreground: *mic_color,
                          }
                      - string: { text: " {source_percent}%" }
                      - <<: *source_info
                      - <<: *source_info_end
    - network:
        poll-interval: 15000
        content:
          map:
            default: { empty: {} }
            conditions:
              name == wlp0s20f3:
                map:
                  on-click: /bin/sh -c "foot nmtui"
                  default:
                    - string: { text: "NET", <<: *warn }
                    - string: { text: " OK" }
                    - string: { text: " [offline]", <<: *info }
                  conditions:
                    state == down:
                      - string: { text: "NET", <<: *error }
                      - string: { text: " OFF" }
                      - string: { text: " [offline]", <<: *info }
                    state == up:
                      - string: { text: "NET", foreground: *net_color }
                      - string: { text: " {signal}" }
                      - string: { text: " [{ssid}", max: 15, <<: *info }
                      - string: { text: "]", <<: *info }
    - battery:
        name: BAT0
        poll-interval: 30000
        anchors:
          - string:
              &estimate {
                string: { text: " [{estimate}H {power}W]", <<: *info },
              }
        content:
          map:
            on-click: /bin/sh -c "/home/$USER/.config/yambar/scripts/powerprofile-toggle.sh",
            conditions:
              state == unknown:
                - string: { text: "BAT {capacity}% [{estimate}]" }
              state == discharging:
                map:
                  conditions:
                    capacity > 25:
                      - string: { text: "BAT", foreground: *bat_color }
                      - string: { text: " {capacity}%" }
                      - <<: *estimate
                    capacity <= 25:
                      - string: { text: "BAT", <<: *warn }
                      - string: { text: " {capacity}%" }
                      - <<: *estimate
                    capacity <= 15:
                      - string: { text: "BAT", <<: *error }
                      - string: { text: " {capacity}%" }
                      - <<: *estimate
              state == "not charging":
                - string: { text: "EXT", <<: *warn }
                - string: { text: " {capacity}%" }
                - <<: *estimate
              state == charging:
                map:
                  conditions:
                    capacity > 80:
                      - string: { text: "CHG", <<: *error }
                      - string: { text: " {capacity}%" }
                      - <<: *estimate
                    capacity <= 80:
                      - string: { text: "CHG", <<: *good }
                      - string: { text: " {capacity}%" }
                      - <<: *estimate
              state == full:
                - string: { text: "EXT {capacity}%", <<: *error }
                - <<: *estimate
    - label:
        content:
          - string:
              on-click: /bin/sh -c "swaymsg reload"
              font: *icon_font
              text: "󰜉  "
          - string:
              on-click: /bin/sh -c "/home/$USER/.config/wofi/powermenu/launch.sh"
              font: *icon_font
              text: " ⏻  "
