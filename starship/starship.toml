format = "$time$username$hostname$git_branch$c$cpp$rust$nodejs$cmake$helm$kubernetes$python$cmd_duration\n$directory$character"
add_newline = false

[hostname]
ssh_only = false
style = "green"
format = '[@$ssh_symbol$hostname]($style) '

[username]
style_user = "italic bold green"
format = '[$user]($style)'
show_always = true

[kubernetes]
disabled = false

[time]
disabled = false
use_12hr = false
style = 'bold green'
format = '[\[🕙$time\]]($style) '

[directory]
style = 'bold blue'
truncation_length = 255
truncate_to_repo = false
use_logical_path = false
